    /* ===== 字体 ===== */
    @font-face {
      font-family: 'Yuangu';
      src: url('assets/fonts/YuanguSongti-Regular.otf') format('opentype'),
           url('assets/fonts/YuanguSongti-Regular.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
      font-display: swap;
    }

    /* ===== 变量 ===== */
    :root {
      --color-dark: #333333;
      --color-paper: #FAFAFA;
      --color-blue: #E0F7FA;
      --color-gray: #888888;
      --color-light-gray: #E5E5E5;
      --color-border: rgba(0, 0, 0, 0.08);
      --color-shadow: rgba(0, 0, 0, 0.06);
      --color-shadow-hover: rgba(0, 0, 0, 0.12);
      --font-main: 'Yuangu', 'Inter', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      --radius: 10px;
      --transition-fast: 0.2s ease;
      --transition-medium: 0.3s ease;
      --max-width: 1200px;
    }

    /* =====  reset ===== */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: var(--font-main);
      color: var(--color-dark);
      background-color: var(--color-paper);
      background-image:
        radial-gradient(circle at 12% 18%, rgba(0,0,0,0.018) 0%, transparent 45%),
        radial-gradient(circle at 88% 82%, rgba(0,0,0,0.015) 0%, transparent 40%),
        linear-gradient(rgba(0,0,0,0.012) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,0,0,0.012) 1px, transparent 1px);
      background-size: 100% 100%, 100% 100%, 48px 48px, 48px 48px;
      line-height: 1.7;
      letter-spacing: 0.02em;
      -webkit-font-smoothing: antialiased;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    img {
      max-width: 100%;
      display: block;
    }

    /* ===== 顶部导航 ===== */
    .top-nav {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(250, 250, 250, 0.92);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--color-border);
    }

    .nav-container {
      max-width: var(--max-width);
      margin: 0 auto;
      padding: 0 32px;
      height: 72px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .nav-brand {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: 0.08em;
      color: var(--color-dark);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .nav-brand i {
      font-size: 16px;
      color: var(--color-gray);
    }

    .nav-links {
      display: flex;
      list-style: none;
      gap: 8px;
    }

    .nav-links a {
      display: block;
      padding: 10px 18px;
      font-size: 14px;
      color: var(--color-gray);
      border-radius: 20px;
      transition: color var(--transition-fast), background var(--transition-fast);
      cursor: pointer;
      white-space: nowrap;
    }

    .nav-links a:hover,
    .nav-links a.active {
      color: var(--color-dark);
      background: var(--color-blue);
    }

    .nav-toggle {
      display: none;
      width: 44px;
      height: 44px;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      color: var(--color-dark);
      background: transparent;
      border: none;
      cursor: pointer;
    }

    /* ===== Hero ===== */
    .hero {
      max-width: var(--max-width);
      margin: 0 auto;
      padding: 120px 32px 100px;
      text-align: center;
    }

    .hero h1 {
      font-size: 48px;
      font-weight: 400;
      letter-spacing: 0.12em;
      margin-bottom: 20px;
      color: var(--color-dark);
    }

    .hero p {
      font-size: 16px;
      color: var(--color-gray);
      max-width: 560px;
      margin: 0 auto;
      line-height: 1.9;
    }

    /* ===== 通用板块 ===== */
    .section {
      max-width: var(--max-width);
      margin: 0 auto;
      padding: 80px 32px;
      border-top: 1px solid var(--color-border);
    }

    .section-title {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.18em;
      color: var(--color-gray);
      text-transform: uppercase;
      margin-bottom: 48px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .section-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--color-border);
    }

    /* ===== 项目网格 ===== */
    .category-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 36px;
      gap: 16px;
      flex-wrap: wrap;
    }

    .category-heading {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .category-title {
      font-size: 32px;
      font-weight: 400;
      letter-spacing: 0.06em;
      color: var(--color-dark);
    }

    .category-detail-hint {
      font-size: 12px;
      color: var(--color-gray);
    }

    .category-detail-hint a {
      color: inherit;
      text-decoration: none;
      transition: color var(--transition-fast);
    }

    .category-detail-hint a:hover {
      color: var(--color-dark);
    }

    .category-desc {
      font-size: 14px;
      color: var(--color-gray);
    }

    .project-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 28px;
    }

    .project-card {
      background: #fff;
      border: 1px solid var(--color-border);
      border-radius: var(--radius);
      overflow: hidden;
      transition: transform var(--transition-medium), box-shadow var(--transition-medium), border-color var(--transition-fast);
      cursor: pointer;
    }

    .project-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 40px var(--color-shadow-hover);
      border-color: rgba(0,0,0,0.14);
    }

    .project-card-image {
      width: 100%;
      height: 200px;
      object-fit: cover;
      filter: grayscale(100%);
      transition: filter var(--transition-medium), transform var(--transition-medium);
    }

    .project-card:hover .project-card-image {
      filter: grayscale(60%);
      transform: scale(1.02);
    }

    .project-card-body {
      padding: 24px;
    }

    .project-card-title {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 10px;
      color: var(--color-dark);
      transition: color var(--transition-fast);
    }

    .project-card:hover .project-card-title {
      color: #000;
    }

    .project-card-desc {
      font-size: 13px;
      color: var(--color-gray);
      line-height: 1.7;
      margin-bottom: 16px;
    }

    .project-card-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .project-card-tag {
      font-size: 11px;
      padding: 4px 10px;
      border: 1px solid var(--color-light-gray);
      border-radius: 12px;
      color: var(--color-dark);
      background: var(--color-paper);
    }

    /* ===== 技术栈 ===== */
    .skill-cloud {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      justify-content: center;
    }

    .skill-item {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 20px;
      border: 1px solid var(--color-border);
      border-radius: 30px;
      background: #fff;
      color: var(--color-dark);
      font-size: 13px;
      transition: transform var(--transition-fast), box-shadow var(--transition-fast), border-color var(--transition-fast);
      cursor: default;
    }

    .skill-item:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px var(--color-shadow);
      border-color: rgba(0,0,0,0.14);
    }

    .skill-item i {
      color: var(--color-gray);
      font-size: 14px;
    }

    .skill-level-high { font-size: 15px; padding: 12px 24px; }
    .skill-level-mid { font-size: 13px; padding: 10px 20px; }
    .skill-level-low { font-size: 12px; padding: 8px 16px; }

    /* ===== 案例分析 ===== */
    .case-list {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .case-item {
      background: #fff;
      border: 1px solid var(--color-border);
      border-radius: var(--radius);
      overflow: hidden;
      transition: box-shadow var(--transition-medium), border-color var(--transition-fast);
    }

    .case-item:hover {
      box-shadow: 0 8px 30px var(--color-shadow-hover);
      border-color: rgba(0,0,0,0.12);
    }

    .case-header {
      display: flex;
      align-items: center;
      gap: 20px;
      padding: 20px 24px;
      cursor: pointer;
      transition: background var(--transition-fast);
    }

    .case-header:hover {
      background: rgba(224, 247, 250, 0.3);
    }

    .case-thumb {
      width: 80px;
      height: 80px;
      border-radius: 8px;
      object-fit: cover;
      filter: grayscale(100%);
      flex-shrink: 0;
    }

    .case-meta {
      flex: 1;
    }

    .case-title {
      font-size: 17px;
      font-weight: 600;
      margin-bottom: 6px;
      color: var(--color-dark);
    }

    .case-summary {
      font-size: 13px;
      color: var(--color-gray);
      line-height: 1.6;
    }

    .case-toggle {
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--color-gray);
      transition: transform var(--transition-fast);
    }

    .case-item.open .case-toggle {
      transform: rotate(180deg);
    }

    .case-body {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.4s ease, padding 0.4s ease;
    }

    .case-item.open .case-body {
      max-height: 3000px;
      padding: 0 24px 32px;
    }

    .case-body-content {
      font-size: 14px;
      line-height: 1.9;
      color: var(--color-dark);
    }

    .case-body-content h4 {
      font-size: 15px;
      font-weight: 600;
      margin: 28px 0 12px;
      color: var(--color-dark);
      letter-spacing: 0.04em;
    }

    .case-body-content h4:first-child {
      margin-top: 0;
    }

    .case-body-content p {
      margin-bottom: 14px;
      color: var(--color-dark);
    }

    .case-body-content ul {
      margin-left: 20px;
      margin-bottom: 14px;
    }

    .case-body-content li {
      margin-bottom: 8px;
    }

    /* ===== Footer ===== */
    footer {
      max-width: var(--max-width);
      margin: 0 auto;
      padding: 40px 32px;
      text-align: center;
      font-size: 12px;
      color: var(--color-gray);
      border-top: 1px solid var(--color-border);
    }

    .social-links {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-bottom: 16px;
    }

    .social-links a {
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--color-border);
      border-radius: 50%;
      color: var(--color-gray);
      transition: color var(--transition-fast), background var(--transition-fast), border-color var(--transition-fast);
    }

    .social-links a:hover {
      color: var(--color-dark);
      background: var(--color-blue);
      border-color: var(--color-blue);
    }

    /* ===== 响应式 ===== */
    @media (max-width: 1024px) {
      .project-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 768px) {
      .nav-container {
        height: 64px;
        padding: 0 20px;
      }

      .nav-links {
        display: none;
        position: absolute;
        top: 64px;
        left: 0;
        right: 0;
        flex-direction: column;
        background: rgba(250, 250, 250, 0.98);
        padding: 16px 20px;
        gap: 4px;
        border-bottom: 1px solid var(--color-border);
      }

      .nav-links.open {
        display: flex;
      }

      .nav-links a {
        padding: 14px 16px;
        border-radius: 8px;
      }

      .nav-toggle {
        display: flex;
      }

      .hero {
        padding: 80px 20px 60px;
      }

      .hero h1 {
        font-size: 32px;
      }

      .section {
        padding: 60px 20px;
      }

      .project-grid {
        grid-template-columns: 1fr;
      }

      .category-title {
        font-size: 24px;
      }

      .case-header {
        flex-direction: column;
        align-items: flex-start;
      }

      .case-thumb {
        width: 100%;
        height: 160px;
      }
    }
  </style>
</head>

    let activeCategory = 'games';

    function renderProjects(category) {
      const data = projectData[category];
      document.getElementById('categoryTitle').textContent = data.title;
      document.getElementById('categoryDesc').textContent = data.desc;
      document.getElementById('categoryDetailLink').href = data.detailLink;
      const grid = document.getElementById('projectGrid');
      grid.innerHTML = data.items.map(item => `
        <article class="project-card" onclick="location.href='${item.link}'">
          <img class="project-card-image" src="${item.image}" alt="${item.title}" loading="lazy">
          <div class="project-card-body">
            <h3 class="project-card-title">${item.title}</h3>
            <p class="project-card-desc">${item.desc}</p>
            <div class="project-card-tags">
              ${(item.tags || []).map(tag => `<span class="project-card-tag">${tag}</span>`).join('')}
            </div>
          </div>
        </article>
      `).join('');
    }

    function renderSkills() {
      const cloud = document.getElementById('skillCloud');
      cloud.innerHTML = skills.map(skill => `
        <span class="skill-item skill-level-${skill.level}">
          <i class="${skill.icon}"></i>
          ${skill.name}
        </span>
      `).join('');
    }

    function renderCases() {
      const list = document.getElementById('caseList');
      list.innerHTML = caseStudies.map((item, index) => `
        <div class="case-item" data-index="${index}">
          <div class="case-header" onclick="toggleCase(${index})">
            <img class="case-thumb" src="${item.image}" alt="${item.title}" loading="lazy">
            <div class="case-meta">
              <h3 class="case-title">${item.title}</h3>
              <p class="case-summary">${item.summary}</p>
            </div>
            <span class="case-toggle"><i class="fa-solid fa-chevron-down"></i></span>
          </div>
          <div class="case-body">
            <div class="case-body-content">
              ${item.content}
            </div>
          </div>
        </div>
      `).join('');
    }

    function toggleCase(index) {
      const items = document.querySelectorAll('.case-item');
      items.forEach((item, i) => {
        if (i === index) {
          item.classList.toggle('open');
        } else {
          item.classList.remove('open');
        }
      });
    }

    function initNav() {
      const links = document.querySelectorAll('.nav-links a');
      links.forEach(link => {
        link.addEventListener('click', () => {
          links.forEach(l => l.classList.remove('active'));
          link.classList.add('active');
          activeCategory = link.dataset.category;
          renderProjects(activeCategory);
          document.getElementById('projects').scrollIntoView({ behavior: 'smooth', block: 'start' });
        });
      });

      document.getElementById('navToggle').addEventListener('click', () => {
        document.getElementById('navLinks').classList.toggle('open');
      });
    }

    document.addEventListener('DOMContentLoaded', () => {
      renderProjects(activeCategory);
      renderSkills();
      renderCases();
      initNav();
    });
  </script>
